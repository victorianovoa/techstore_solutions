<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TechStore Solutions</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-box">

    <!-- Logo -->
    <div style="text-align:center;margin-bottom:20px;">
      <div class="auth-logo-box">TS</div>
    </div>
    <h2>Bem-vindo de volta!</h2>
    <p class="auth-sub">Entre na sua conta TechStore</p>

    <!-- Mensagens de feedback -->
    <div class="msg-erro" id="msg-erro">⚠️ <span id="txt-erro"></span></div>

    <!-- Formulário de login -->
    <!-- Envia via fetch POST para LoginController.php (original do backend) -->
    <form id="form-login">

      <div class="campo">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email"
               placeholder="seu@email.com" required autocomplete="email">
      </div>

      <div class="campo">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha"
               placeholder="••••••" required autocomplete="current-password">
      </div>

      <button type="submit" id="btn-entrar" class="btn btn-primary btn-full"
              style="margin-top:6px;">
        Entrar →
      </button>

    </form>

    <div class="divisor">ou</div>

    <div class="auth-footer">
      Não tem conta? <a href="cadastro.html">Criar conta</a>
    </div>
    <div class="auth-footer" style="margin-top:10px;">
      <a href="index.html">← Voltar à loja</a>
    </div>

  </div>
</div>

<div id="toast-wrap" class="toast-wrap"></div>
<script src="js/main.js"></script>
<script>
  /*
   * login.html — envia as credenciais via fetch POST para
   * LoginController.php (arquivo original do backend).
   *
   * O LoginController.php original recebe:
   *   $_POST["email"]  e  $_POST["senha"]
   * e executa a query de autenticação.
   *
   * Como o controller original não retorna JSON (apenas
   * inicia a sessão PHP), adaptamos para capturar a
   * resposta e tratar o redirecionamento no JS.
   */

  var CONTROLLER = '../backend/controllers/LoginController.php';

  document.getElementById('form-login').addEventListener('submit', function(e) {
    e.preventDefault();

    var btn  = document.getElementById('btn-entrar');
    var erro = document.getElementById('msg-erro');
    var txtE = document.getElementById('txt-erro');

    btn.disabled    = true;
    btn.textContent = 'Entrando…';
    erro.style.display = 'none';

    /* Monta FormData com os campos que o controller original espera */
    var fd = new FormData();
    fd.append('email', document.getElementById('email').value.trim());
    fd.append('senha', document.getElementById('senha').value);

    fetch(CONTROLLER, { method: 'POST', body: fd })
      .then(function(r) { return r.text(); })
      .then(function(resposta) {
        /*
         * O LoginController.php original não retorna JSON.
         * Verificamos se houve redirecionamento (status 200
         * após session_start) ou texto de erro.
         * Se a resposta estiver vazia ou sem "erro", assumimos sucesso.
         */
        var respostaBaixa = resposta.toLowerCase();

        if (respostaBaixa.includes('erro') || respostaBaixa.includes('invalid') ||
            respostaBaixa.includes('incorreto') || respostaBaixa.includes('falhou')) {
          txtE.textContent    = 'E-mail ou senha incorretos.';
          erro.style.display  = 'block';
          btn.disabled        = false;
          btn.textContent     = 'Entrar →';
        } else {
          /* Login bem-sucedido → salva nome no localStorage e redireciona */
          localStorage.setItem('ts_logado', '1');
          toast('Login realizado com sucesso! 👋', 'ok');
          setTimeout(function() { window.location.href = 'index.html'; }, 900);
        }
      })
      .catch(function() {
        txtE.textContent    = 'Erro de conexão. Verifique o servidor PHP.';
        erro.style.display  = 'block';
        btn.disabled        = false;
        btn.textContent     = 'Entrar →';
      });
  });
</script>
</body>
</html>
