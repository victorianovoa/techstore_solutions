<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — TechStore Solutions</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-box">

    <div style="text-align:center;margin-bottom:20px;">
      <div class="auth-logo-box">TS</div>
    </div>
    <h2>Criar sua conta</h2>
    <p class="auth-sub">Junte-se à TechStore Solutions</p>

    <!-- Mensagens -->
    <div class="msg-erro" id="msg-erro">⚠️ <span id="txt-erro"></span></div>
    <div class="msg-ok"   id="msg-ok">✅ <span id="txt-ok"></span></div>

    <!--
      Formulário de cadastro.
      O backend original não possui um controller de cadastro de usuários.
      Os dados são enviados via fetch para que o backend possa ser
      integrado quando o controller for criado, seguindo o mesmo
      padrão do ProdutoController.php (POST com $_POST[campo]).
    -->
    <form id="form-cad">

      <div class="campo">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" placeholder="Seu nome completo" required>
        <span class="campo-erro" id="erro-nome" style="font-size:.75rem;color:var(--danger);margin-top:4px;display:none;"></span>
      </div>

      <div class="campo">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">
        <span class="campo-erro" id="erro-cpf"  style="font-size:.75rem;color:var(--danger);margin-top:4px;display:none;"></span>
      </div>

      <div class="campo">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required>
        <span class="campo-erro" id="erro-email" style="font-size:.75rem;color:var(--danger);margin-top:4px;display:none;"></span>
      </div>

      <div class="campo">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required>
        <span class="campo-erro" id="erro-senha" style="font-size:.75rem;color:var(--danger);margin-top:4px;display:none;"></span>
      </div>

      <div class="campo">
        <label for="confirmar">Confirmar senha</label>
        <input type="password" id="confirmar" placeholder="Repita a senha" required>
        <span class="campo-erro" id="erro-conf" style="font-size:.75rem;color:var(--danger);margin-top:4px;display:none;"></span>
      </div>

      <button type="submit" id="btn-cad" class="btn btn-primary btn-full" style="margin-top:6px;">
        Criar Conta
      </button>

    </form>

    <div class="divisor">ou</div>
    <div class="auth-footer">Já tem conta? <a href="login.html">Entrar</a></div>
    <div class="auth-footer" style="margin-top:10px;"><a href="index.html">← Voltar à loja</a></div>

  </div>
</div>

<div id="toast-wrap" class="toast-wrap"></div>
<script src="js/main.js"></script>
<script>
  /* Máscara CPF: 000.000.000-00 */
  document.getElementById('cpf').addEventListener('input', function() {
    var v = this.value.replace(/\D/g, '');
    if      (v.length <= 3) this.value = v;
    else if (v.length <= 6) this.value = v.slice(0,3)+'.'+v.slice(3);
    else if (v.length <= 9) this.value = v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6);
    else                    this.value = v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6,9)+'-'+v.slice(9,11);
  });

  /* Exibe mensagem de erro em um campo */
  function erroField(id, msg) {
    var el = document.getElementById(id);
    el.textContent   = msg;
    el.style.display = 'block';
    return false;
  }

  /* Limpa todos os erros de campo */
  function limparErros() {
    ['erro-nome','erro-cpf','erro-email','erro-senha','erro-conf'].forEach(function(id) {
      var el = document.getElementById(id);
      el.textContent   = '';
      el.style.display = 'none';
    });
    document.getElementById('msg-erro').style.display = 'none';
    document.getElementById('msg-ok').style.display   = 'none';
  }

  document.getElementById('form-cad').addEventListener('submit', function(e) {
    e.preventDefault();
    limparErros();

    var nome     = document.getElementById('nome').value.trim();
    var cpf      = document.getElementById('cpf').value.trim();
    var email    = document.getElementById('email').value.trim();
    var senha    = document.getElementById('senha').value;
    var confirmar= document.getElementById('confirmar').value;
    var valido   = true;

    /* Validações no front-end */
    if (nome.length < 3)                                  { erroField('erro-nome',  'Informe o nome completo.');         valido = false; }
    if (cpf && cpf.replace(/\D/g,'').length !== 11)       { erroField('erro-cpf',   'CPF inválido.');                    valido = false; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))       { erroField('erro-email', 'E-mail inválido.');                  valido = false; }
    if (senha.length < 6)                                  { erroField('erro-senha', 'Mínimo 6 caracteres.');             valido = false; }
    if (senha !== confirmar)                               { erroField('erro-conf',  'As senhas não coincidem.');          valido = false; }
    if (!valido) return;

    var btn = document.getElementById('btn-cad');
    btn.disabled    = true;
    btn.textContent = 'Cadastrando…';

    /*
     * Envia para o backend seguindo o mesmo padrão do ProdutoController.php:
     * POST com FormData. O endpoint de cadastro de usuários deve ser criado
     * no backend seguindo a mesma estrutura dos controllers originais.
     */
    var fd = new FormData();
    fd.append('nome',  nome);
    fd.append('email', email);
    fd.append('cpf',   cpf);
    fd.append('senha', senha);

    fetch('../backend/controllers/CadastrarUsuario.php', { method: 'POST', body: fd })
      .then(function(r) { return r.text(); })
      .then(function(resp) {
        var ok  = document.getElementById('msg-ok');
        var err = document.getElementById('msg-erro');

        if (resp.toLowerCase().includes('sucesso') || resp.trim() === '' || resp.includes('1')) {
          document.getElementById('txt-ok').textContent = 'Conta criada! Redirecionando para o login…';
          ok.style.display = 'block';
          setTimeout(function() { window.location.href = 'login.html'; }, 1800);
        } else {
          document.getElementById('txt-erro').textContent = resp || 'Erro ao cadastrar. Tente novamente.';
          err.style.display = 'block';
          btn.disabled      = false;
          btn.textContent   = 'Criar Conta';
        }
      })
      .catch(function() {
        /* Se o controller ainda não existir no backend, mostra mensagem orientativa */
        document.getElementById('txt-erro').textContent =
          'Controller de cadastro não encontrado no backend. Crie CadastrarUsuario.php seguindo o padrão dos controllers originais.';
        document.getElementById('msg-erro').style.display = 'block';
        btn.disabled    = false;
        btn.textContent = 'Criar Conta';
      });
  });
</script>
</body>
</html>
